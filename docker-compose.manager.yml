# ExecTunnel — multi-tunnel manager mode
#
# Usage:
#   cp .env.manager .env          # fill in your WSS_URL_* entries
#   docker compose -f docker-compose.manager.yml up

services:
  manager:
    build:
      context: .
      target: runtime
    image: ${EXECTUNNEL_IMAGE:-khodaparastan/exectunnel:latest}
    container_name: exectunnel-manager
    restart: unless-stopped
    ports:
      - "1080-1090:1080-1090"
    environment:
      SOCKS_HOST: "0.0.0.0"
    env_file:
      - .env
    command: [ "manager", "--env-file", "/app/.env" ]
    volumes:
      - ./.env:/app/.env:ro
