name: Publish Docker Image

on:
  release:
    types: [ published ]
  push:
    tags: [ "v*" ]            # also fires on manual `git push --tags`

permissions:
  contents: read
  packages: write           # required for GHCR push

env:
  DOCKERHUB_IMAGE: khodaparastan/exectunnel
  GHCR_IMAGE: ghcr.io/khodaparastan/exectunnel

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Metadata (tags & labels from Git / OCI) ────────────────────────────
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.DOCKERHUB_IMAGE }}
            ${{ env.GHCR_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=ExecTunnel
            org.opencontainers.image.description=SOCKS5 proxy tunnel over WebSocket into Kubernetes pods
            org.opencontainers.image.url=https://github.com/khodaparastan/exectunnel
            org.opencontainers.image.licenses=MIT

      # ── Multi-platform builder (QEMU for arm64) ────────────────────────────
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Registry authentication ─────────────────────────────────────────────
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Build & push ────────────────────────────────────────────────────────
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runtime
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Summary ─────────────────────────────────────────────────────────────
      - name: Image digest
        run: |
          echo "## 🐳 Published Docker images" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Tags:**" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.meta.outputs.tags }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Digest:** \`${{ steps.meta.outputs.digest }}\`" >> "$GITHUB_STEP_SUMMARY"
