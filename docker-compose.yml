# ExecTunnel — single-tunnel quick start
#
# Usage:
#   cp .env.manager .env          # fill in your WSS_URL
#   docker compose up              # starts tunnel on localhost:1080
#
# For multi-tunnel (manager mode), see docker-compose.manager.yml.

services:
  tunnel:
    build:
      context: .
      target: runtime
    image: ${EXECTUNNEL_IMAGE:-khodaparastan/exectunnel:latest}
    container_name: exectunnel
    restart: unless-stopped
    ports:
      - "0.0.0.0:${SOCKS_PORT:-1080}:1080"
    environment:
      WSS_URL: "${WSS_URL:?Set WSS_URL in .env or shell}"
      WSS_INSECURE: "${WSS_INSECURE:-true}"
      LOG_LEVEL: "${LOG_LEVEL:-debug}"
    # Bind on all interfaces so Docker port-mapping reaches the SOCKS5 server.
    command: [ "tunnel", "--socks-host", "0.0.0.0" ]
    # To pass extra flags (e.g. DNS):
    # command: ["tunnel", "--socks-host", "0.0.0.0", "--dns", "10.96.0.10"]
