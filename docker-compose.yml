# ExecTunnel
#
# Usage:
#   cp config.toml.example config.toml
#   docker compose up
#

services:
  tunnel:
    build:
      context: .
      target: runtime
    image: ${EXECTUNNEL_IMAGE:-khodaparastan/exectunnel:latest}
    container_name: exectunnel
    restart: unless-stopped
    ports:
      - "0.0.0.0:${SOCKS_PORT:-1080}:1080"
    environment:
      LOG_LEVEL: "${LOG_LEVEL:-debug}"
    # Bind on all interfaces so Docker port-mapping reaches the SOCKS5 server.
    command: [ "run", "--socks-host", "0.0.0.0" ]
    # To pass extra flags (e.g. DNS):
    # command: ["run", "--socks-host", "0.0.0.0", "--dns", "10.96.0.10"]
