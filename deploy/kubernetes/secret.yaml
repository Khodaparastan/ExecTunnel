apiVersion: v1
kind: Secret
metadata:
  name: exectunnel-secret
  namespace: exectunnel
  labels:
    app.kubernetes.io/name: exectunnel
    app.kubernetes.io/component: tunnel
type: Opaque
stringData:
  # ── Single-tunnel mode ──────────────────────────────────────────────────────
  WSS_URL: "wss://your-endpoint.example/ws"

  # ── Multi-tunnel mode (manager) — add as many as needed ─────────────────────
  # WSS_URL_1: "wss://stream.example.com/exec/...?token=TOKEN1&pod=pod-1"
  # SOCKS_PORT_1: "1081"
  # LABEL_1: "pod-1"
  #
  # WSS_URL_2: "wss://stream.example.com/exec/...?token=TOKEN2&pod=pod-2"
  # SOCKS_PORT_2: "1082"
  # LABEL_2: "pod-2"
