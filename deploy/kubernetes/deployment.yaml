apiVersion: apps/v1
kind: Deployment
metadata:
  name: exectunnel
  namespace: exectunnel
  labels:
    app.kubernetes.io/name: exectunnel
    app.kubernetes.io/component: tunnel
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: exectunnel
  template:
    metadata:
      labels:
        app.kubernetes.io/name: exectunnel
        app.kubernetes.io/component: tunnel
    spec:
      serviceAccountName: exectunnel
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: tunnel
          image: exectunnel:latest
          imagePullPolicy: IfNotPresent
          args: [ "tunnel", "--socks-host", "0.0.0.0" ]
          ports:
            - containerPort: 1080
              name: socks
              protocol: TCP
          envFrom:
            - configMapRef:
                name: exectunnel-config
            - secretRef:
                name: exectunnel-secret
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          livenessProbe:
            tcpSocket:
              port: 1080
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            tcpSocket:
              port: 1080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
